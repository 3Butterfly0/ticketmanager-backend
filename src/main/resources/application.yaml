spring:
  application:
    name: ticketmanager
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticket_manager}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
