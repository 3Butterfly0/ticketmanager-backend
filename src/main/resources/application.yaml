spring:
  application:
    name: ticketmanager
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
